<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VortexTech Week 2 - Contact Form & Dark Mode</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>VortexTech Web Dev — Week 2</h1>
    <button id="themeToggle" type="button">🌙 Dark Mode</button>
  </header>

  <main>
    <section class="form-section">
      <h2>Contact Us</h2>
      <form id="contactForm" novalidate>

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name">
          <p class="error" id="nameError"></p>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="text" id="email" name="email">
          <p class="error" id="emailError"></p>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>
          <p class="error" id="messageError"></p>
        </div>

        <button type="submit" id="submitBtn">Send Message</button>

        <p class="success" id="successMessage"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>VortexTech Internship — Week 2 Task</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
